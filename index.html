<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Medimind - Consulta FDA</title>
</head>
<body>
    <h1>Consulta de Medicamentos (OpenFDA)</h1>
    <button onclick="buscarMedicamento()">Consultar Advil</button>
    <div id="resultado"></div>

    <script>
        async function buscarMedicamento() {
            const display = document.getElementById('resultado');
            display.innerHTML = "Carregando...";
            
            try {
                const response = await fetch('https://api.fda.gov/drug/label.json?search=brand_name:advil&limit=1');
                const data = await response.json();
                const nome = data.results[0].openfda.brand_name[0];
                const finalidade = data.results[0].purpose[0];
                
                display.innerHTML = `<p><strong>Medicamento:</strong> ${nome}</p>
                                     <p><strong>Finalidade:</strong> ${finalidade}</p>`;
            } catch (error) {
                display.innerHTML = "Erro ao conectar com a API.";
            }
        }
    </script>
</body>
</html>
